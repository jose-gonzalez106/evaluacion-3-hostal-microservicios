spring:
    application:
        name: hostal # Nombre del microservicio registrado en Eureka

    datasource:
        url: jdbc:mysql://localhost:3306/hostaldb?useSSL=false&serverTimezone=America/Santiago&createDatabaseIfNotExist=true # URL de conexión a MySQL
        username: root # Usuario de base de datos
        password: "" # Contraseña de base de datos
        driver-class-name: com.mysql.cj.jdbc.Driver # Driver JDBC para MySQL

    jpa:
        hibernate:
            ddl-auto: update # Actualiza el esquema automáticamente sin borrar datos
        show-sql: true # Muestra las consultas SQL en consola
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect # Dialecto para MySQL 8
                format_sql: true # Formatea el SQL para mejor legibilidad

server:
    port: 8082 # Puerto donde corre este microservicio

springdoc:
    api-docs:
        enabled: true # Habilita la generación de documentación OpenAPI
        path: /hostal/api-docs # Ruta donde se expone el JSON de la API
    swagger-ui:
        enabled: true # Habilita la interfaz gráfica de Swagger
        path: /swagger-ui/index.html # Ruta de acceso a la UI de Swagger

logging:
    level:
        com.example.hostadmin: DEBUG # Logs detallados del paquete principal
        org.hibernate.SQL: DEBUG # Logs de consultas SQL de Hibernate

eureka:
    client:
        register-with-eureka: true # Registra este servicio en Eureka
        fetch-registry: true # Descarga el registro de otros servicios
        service-url:
            defaultZone: http://localhost:8761/eureka/ # URL del servidor Eureka
