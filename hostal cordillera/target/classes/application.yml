spring:
    main:
        allow-bean-definition-overriding: true
    application:
        name: hostal
    datasource:
        url: jdbc:mysql://localhost:3306/hostaldb?useSSL=false&serverTimezone=America/Santiago&createDatabaseIfNotExist=true
        username: root
        password: ""
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                format_sql: true

server:
    port: 8082

springdoc:
    api-docs:
        enabled: true
        path: /hostal/api-docs
    swagger-ui:
        enabled: true
        path: /swagger-ui/index.html

logging:
    level:
        com.example.hostadmin: DEBUG
        org.hibernate.SQL: DEBUG

eureka:
    client:
        register-with-eureka: true
        fetch-registry: true
        service-url:
            defaultZone: http://localhost:8761/eureka/
