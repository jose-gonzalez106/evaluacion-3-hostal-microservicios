version: "3.8"

services:

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    networks:
      - network-hostal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--protocol=tcp", "-uroot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  eureka-server:
    build: ./eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - network-hostal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build: ./gateway
    container_name: api-gateway
    ports:
      - "8099:8099"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - network-hostal
    depends_on:
      eureka-server:
        condition: service_healthy

  huespedes-service:
    build: ./huespedes
    container_name: huespedes-service
    restart: "no"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DATABASE_HOST: mysql-db
    networks:
      - network-hostal
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  hostal-service:
    build: ./hostal_cordillera
    container_name: hostal-service
    restart: on-failure:5
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DATABASE_HOST: mysql-db
    networks:
      - network-hostal
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  empleados-service:
    build: ./empleados
    container_name: empleados-service
    restart: on-failure:5
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DATABASE_HOST: mysql-db
    networks:
      - network-hostal
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

networks:
  network-hostal:
    driver: bridge