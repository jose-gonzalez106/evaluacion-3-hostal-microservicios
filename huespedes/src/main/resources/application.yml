spring:
    main:
        allow-bean-definition-overriding: true
    application:
        name: huespedes
    datasource:
        url: jdbc:mysql://localhost:3306/db_huespedes?useSSL=false&serverTimezone=America/Santiago&createDatabaseIfNotExist=true
        username: ${DATABASE_USERNAME:root}
        password: ${DATABASE_PASSWORD:}
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.MySQLDialect
    jackson:
        serialization:
            FAIL_ON_EMPTY_BEANS: false

server:
    address: 0.0.0.0
    port: 8081

springdoc:
    api-docs:
        enabled: true
        path: /huespedes/api-docs
    swagger-ui:
        enabled: true
        path: /swagger-ui/index.html

eureka:
    client:
        register-with-eureka: true
        fetch-registry: true
        service-url:
            defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
